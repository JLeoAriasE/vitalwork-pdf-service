.app{display:flex;min-height:100vh}

.brand{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:16px}
.brand-i{width:36px;height:36px;background:linear-gradient(135deg,var(--a),#6366f1);border-radius:9px;display:flex;align-items:center;justify-content:center}
.brand h1{font-size:15px;font-weight:700}.brand small{font-size:10px;color:var(--tm);display:block}
.ni{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:var(--rs);cursor:pointer;color:var(--tm);font-size:12.5px;font-weight:500;transition:all .15s;border:1px solid transparent}
.ni:hover{background:var(--c2);color:var(--t)}.ni.on{background:var(--as);color:var(--a);border-color:rgba(59,130,246,.15)}
.ni svg{width:16px;height:16px;flex-shrink:0}
.nbg{margin-left:auto;background:var(--a);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px}
.nsc{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--td);padding:12px 10px 3px}
.ubar{padding:8px 10px;border-radius:var(--rs);background:var(--ci);border:1px solid var(--bd);display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:#fff}
.uav-a{background:linear-gradient(135deg,var(--p),#6366f1)}.uav-e{background:linear-gradient(135deg,var(--tl),#06b6d4)}.uav-l{background:linear-gradient(135deg,var(--w),var(--or))}.uav-r{background:linear-gradient(135deg,var(--or),var(--er))}.uav-m{background:linear-gradient(135deg,#3b82f6,#1e40af)}.uav-p{background:linear-gradient(135deg,#9333ea,#7c3aed)}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ph h2{font-size:20px;font-weight:700}.ph-s{color:var(--tm);font-size:11px;margin-top:2px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;display:flex;align-items:flex-start;gap:12px}.sc:hover{border-color:var(--a)}

.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.ba{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}

.lc{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:36px;width:100%;max-width:380px}

const SB={
  url:CFG.SUPABASE_URL,key:CFG.SUPABASE_KEY,
  async q(table,method,body,filters,range){
    let u=`${this.url}/rest/v1/${table}`;
    const h={'apikey':this.key,'Authorization':`Bearer ${this.key}`,'Content-Type':'application/json','Prefer':'return=representation'};
    if(range)h['Range']=range;
    if(filters)u+=`?${filters}`;
    if(method==='GET')delete h['Prefer'];
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(u,{method,headers:h,body:body?JSON.stringify(body):undefined,signal:ctrl.signal});
      clearTimeout(timer);
      if(!r.ok){console.warn('SB:',r.status);return null;}
      const text=await r.text();return text?JSON.parse(text):[];
    }catch(e){console.warn('SB offline:',e.message);return null;}
  },
  get(t,f,range){return this.q(t,'GET',null,f,range);},
  post(t,d){return this.q(t,'POST',d);},
  patch(t,d,f){return this.q(t,'PATCH',d,f);},
  del(t,f){return this.q(t,'DELETE',null,f);},
};

// Google Calendar OAuth (para sincronización bidireccional)
const GCAL={
  CLIENT_ID:'',  // Pon tu Google Client ID aquí
  SCOPES:'https://www.googleapis.com/auth/calendar.events',
  token:null,
};
async function gcalAuth(){
  if(!GCAL.CLIENT_ID){
    alert('⚠️ Google Calendar OAuth no configurado.\n\nPasos para configurar:\n\n1. Ve a console.cloud.google.com\n2. Crea un proyecto nuevo\n3. Habilita "Google Calendar API"\n4. Crea credenciales OAuth 2.0\n5. Agrega tu dominio como origen autorizado\n6. Copia el Client ID y pégalo en GCAL.CLIENT_ID\n\nMientras tanto, se usa el link directo a Google Calendar.');
    return false;
  }
  return new Promise((resolve)=>{
    const authUrl=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${GCAL.CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.origin+window.location.pathname)}&response_type=token&scope=${encodeURIComponent(GCAL.SCOPES)}`;
    // Check if we have token from URL hash
    const hash=window.location.hash;
    if(hash.includes('access_token')){
      const params=new URLSearchParams(hash.substring(1));
      GCAL.token=params.get('access_token');
      window.location.hash='';
      resolve(true);
    }else{
      window.location.href=authUrl;
      resolve(false);
    }
  });
}

async function gcalSync(a){
  if(!GCAL.token){
    const ok=await gcalAuth();
    if(!ok){sGC(a);return;}
  }
  const p=gP(a.pid);
  const exams=gAO(a.id);
  let desc=`Tipo: ${a.tipo}\nPaciente: ${p?.nombre||''}\nCédula: ${p?.cedula||''}\nEmpresa: ${p?.empresa||''}`;
  if(exams.length>0){desc+='\n\nExámenes:';exams.forEach(o=>{if(o.cat==='radiologia')desc+=`\n- RX: ${o.parte} (${o.proy})`;else desc+=`\n- ${o.cat}: ${(o.exams||[]).join(', ')}`;});}
  const body={
    summary:`🏥 Cita ${a.tipo}: ${p?.nombre||''}`,
    description:desc,
    location:CFG.ADDR,
    start:{dateTime:`${a.fecha}T${a.hora}:00`,timeZone:'America/Guayaquil'},
    end:{dateTime:`${a.fecha}T${String(+a.hora.split(':')[0]+1).padStart(2,'0')}:${a.hora.split(':')[1]}:00`,timeZone:'America/Guayaquil'},
    reminders:{useDefault:false,overrides:[{method:'popup',minutes:60},{method:'popup',minutes:15}]}
  };
  try{
    const res=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',headers:{'Authorization':`Bearer ${GCAL.token}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(res.ok){const ev=await res.json();alert('✅ Evento creado en Google Calendar\n📅 '+ev.htmlLink);updA(a.id,{gcalId:ev.id});}
    else{const err=await res.json();if(err.error?.code===401){GCAL.token=null;gcalSync(a);}else alert('❌ Error: '+(err.error?.message||''));}
  }catch(e){alert('❌ Error de conexión. Usando link directo.');sGC(a);}
}

function tgL(el,e){const c=el.querySelector('.ek');const s=window._ex;const i=s.lab.indexOf(e);if(i>-1){s.lab.splice(i,1);c.classList.remove('on');}else{s.lab.push(e);c.classList.add('on');}}

function addLabEx(cat,cid){document.getElementById('eli_'+cid).classList.remove('hid');document.getElementById('exi_'+cid).focus();}
function confirmLabEx(cat,cid){
  const inp=document.getElementById('exi_'+cid);const v=inp.value.trim();
  if(!v){alert('Escribe el nombre del examen');return;}

function addRxRow(){
  const n=window._rxCount||1;
  const c=document.getElementById('rxrows');
  const d=document.createElement('div');d.className='rxrow';d.id='rxr_'+n;
  d.innerHTML=`<select class="fi" id="rxp_${n}" style="flex:2"><option value="">Seleccionar parte...</option>${allRX.map(r=>`<option>${r}</option>`).join('')}</select>
  <select class="fi" id="rxpr_${n}" style="flex:1">${PROY.map(p=>`<option>${p}</option>`).join('')}</select>
  <button class="btn bsm bd" onclick="document.getElementById('rxr_${n}').remove()">✕</button>`;
  c.appendChild(d);window._rxCount=n+1;

function svEx(){
  const s=window._ex;
  // Collect RX rows
  const rxStudies=[];
  for(let i=0;i<(window._rxCount||1);i++){
    const pe=document.getElementById('rxp_'+i);const pre=document.getElementById('rxpr_'+i);
    if(pe&&pe.value){rxStudies.push({parte:pe.value,proy:pre?pre.value:'AP'});}
  }
  if(!s.lab.length&&!rxStudies.length&&!s.eco&&!s.ekg&&!s.esp&&!s.aud&&!s.med&&!s.ficha){alert('Selecciona al menos un examen o servicio');return;}
  if(s.lab.length)addO({aid:s.aid,pid:s.pid,cat:'laboratorio',exams:[...s.lab]});
  rxStudies.forEach(rx=>addO({aid:s.aid,pid:s.pid,cat:'radiologia',parte:rx.parte,proy:rx.proy}));
  if(s.eco)addO({aid:s.aid,pid:s.pid,cat:'ecografia',exams:['Ecografía']});
  if(s.ekg)addO({aid:s.aid,pid:s.pid,cat:'electrocardiograma',exams:['EKG 12 derivaciones']});
  if(s.esp)addO({aid:s.aid,pid:s.pid,cat:'espirometria',exams:['Espirometría']});
  if(s.aud)addO({aid:s.aid,pid:s.pid,cat:'audiometria',exams:['Audiometría']});
  if(s.psiocu)addO({aid:s.aid,pid:s.pid,cat:'psico_ocupacional',exams:['Valoración Psicológica Ocupacional']});
  if(s.psicli)addO({aid:s.aid,pid:s.pid,cat:'psico_clinica',exams:['Valoración Psicológica Clínica']});
  if(s.med)addO({aid:s.aid,pid:s.pid,cat:'atencion_medica',exams:['Atención Médica']});
  if(s.ficha)addO({aid:s.aid,pid:s.pid,cat:'ficha_ocupacional',exams:['Ficha Ocupacional']});
  updA(s.aid,{exAsig:true,estado:'en_proceso'});
  closeModal();
  let r='✅ Órdenes creadas:\n';
  if(s.lab.length)r+=`🧪 Lab: ${s.lab.length} exámenes\n`;
  if(rxStudies.length)r+=`🦴 RX: ${rxStudies.length} estudios\n`;
  if(s.eco)r+='🔊 Eco\n';if(s.ekg)r+='❤️ EKG\n';if(s.esp)r+='🫁 Espiro\n';if(s.aud)r+='👂 Audio\n';
  if(s.psiocu)r+='🧠 Psico. Ocupacional\n';
  if(s.psicli)r+='🧠 Psico. Clínica\n';
  if(s.med)r+='🩺 Atención Médica\n';
  if(s.ficha)r+='📋 Ficha Ocupacional\n';
  alert(r);
}

  const dnF=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const evC={pendiente:'var(--ws)',confirmada:'var(--as)',en_proceso:'var(--tls)',completada:'var(--oks)',cancelada:'var(--ers)'};
  const evT={pendiente:'#92400e',confirmada:'var(--a)',en_proceso:'var(--tl)',completada:'var(--ok)',cancelada:'var(--er)'};

  function ds(dt){return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
  function getWeekStart(dt){const d=new Date(dt);d.setDate(d.getDate()-d.getDay());return d;}

  let navH='',bodyH='';

  // ═══ VIEW TABS ═══
  const tabs=`<div class="cvtabs">
    <button class="cvt ${cv==='month'?'on':''}" onclick="S.calView='month';render()">Mes</button>
    <button class="cvt ${cv==='week'?'on':''}" onclick="S.calView='week';render()">Semana</button>
    <button class="cvt ${cv==='day'?'on':''}" onclick="S.calView='day';render()">Día</button>
  </div>`;

  if(cv==='month'){
    // ═══ MONTH VIEW ═══
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
    let c='';for(let i=fd-1;i>=0;i--)c+=`<div class="cdy om"><div class="cdn">${dip-i}</div></div>`;
    for(let i=1;i<=dim;i++){
      const dstr=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      const da=S.apt.filter(a=>a.fecha===dstr&&a.estado!=='cancelada');
      const ev=da.slice(0,2).map(a=>{const p=gP(a.pid);return`<div class="cev" style="background:${evC[a.estado]};color:${evT[a.estado]}">${fT(a.hora)} ${p?.nombre?.split(' ')[0]||''}</div>`;}).join('');
      c+=`<div class="cdy ${dstr===TD?'tod':''}" onclick="S.cDate=new Date(${y},${m},${i});S.calView='day';render()"><div class="cdn">${i}</div>${ev}${da.length>2?`<div style="font-size:8px;color:var(--tm)">+${da.length-2} más</div>`:''}</div>`;
    }
    navH=`<button class="btn bic bg" onclick="S.cDate=new Date(${y},${m-1});render()">${ic('cL')}</button><h3 style="min-width:180px;text-align:center">${mn[m]} ${y}</h3><button class="btn bic bg" onclick="S.cDate=new Date(${y},${m+1});render()">${ic('cR')}</button>`;
    bodyH=`<div class="cgr">${dn.map(d=>`<div class="cdyh">${d}</div>`).join('')}${c}</div>`;

  }else if(cv==='week'){
    // ═══ WEEK VIEW ═══
    const ws=getWeekStart(d);
    const we=new Date(ws);we.setDate(we.getDate()+6);
    const weekDays=[];for(let i=0;i<7;i++){const wd=new Date(ws);wd.setDate(wd.getDate()+i);weekDays.push(wd);}
    const hours=[];for(let h=7;h<=18;h++)hours.push(h);

    navH=`<button class="btn bic bg" onclick="S.cDate=new Date(${ws.getFullYear()},${ws.getMonth()},${ws.getDate()-7});render()">${ic('cL')}</button><h3 style="min-width:220px;text-align:center">${ws.getDate()} ${mnS[ws.getMonth()]} — ${we.getDate()} ${mnS[we.getMonth()]} ${we.getFullYear()}</h3><button class="btn bic bg" onclick="S.cDate=new Date(${ws.getFullYear()},${ws.getMonth()},${ws.getDate()+7});render()">${ic('cR')}</button>`;

    let hdr=`<div class="wgh" style="font-size:8px">Hora</div>`;
    weekDays.forEach(wd=>{const dstr=ds(wd);hdr+=`<div class="wgh ${dstr===TD?'tod':''}">${dn[wd.getDay()]}<br><span style="font-size:13px;font-weight:700">${wd.getDate()}</span></div>`;});

    let rows='';
    hours.forEach(h=>{
      rows+=`<div class="whr">${h>12?h-12:h}${h>=12?'p':'a'}</div>`;
      weekDays.forEach(wd=>{
        const dstr=ds(wd);
        const ha=S.apt.filter(a=>a.fecha===dstr&&a.estado!=='cancelada'&&+a.hora.split(':')[0]===h);
        const evs=ha.map(a=>{const p=gP(a.pid);return`<span class="wev" style="background:${evC[a.estado]};color:${evT[a.estado]}">${fT(a.hora)} ${p?.nombre?.split(' ')[0]||''}</span>`;}).join('');
        rows+=`<div class="wcl" onclick="S.cDate=new Date(${wd.getFullYear()},${wd.getMonth()},${wd.getDate()});S.calView='day';render()">${evs}</div>`;
      });
    });
    bodyH=`<div class="wgr">${hdr}${rows}</div>`;

  }else{
    // ═══ DAY VIEW ═══
    const dstr=ds(d);
    const dayApts=S.apt.filter(a=>a.fecha===dstr).sort((a,b)=>a.hora.localeCompare(b.hora));
    const hours=[];for(let h=7;h<=18;h++){hours.push(h);}

    navH=`<button class="btn bic bg" onclick="S.cDate=new Date(${y},${m},${dd-1});render()">${ic('cL')}</button><h3 style="min-width:220px;text-align:center">${dnF[d.getDay()]} ${dd} de ${mn[m]}, ${y}</h3><button class="btn bic bg" onclick="S.cDate=new Date(${y},${m},${dd+1});render()">${ic('cR')}</button>`;

    let rows='';
    hours.forEach(h=>{
      const ha=dayApts.filter(a=>+a.hora.split(':')[0]===h);
      const evs=ha.map(a=>{
        const p=gP(a.pid);const o=gAO(a.id);
        return`<div class="dev" style="background:${evC[a.estado]};color:${evT[a.estado]}">
          <span style="font-family:'Space Mono',monospace;font-weight:700">${fT(a.hora)}</span>
          <span>${p?.nombre||'—'}</span>
          <span style="opacity:.7;font-size:9px">${p?.empresa||''}</span>
          <span style="font-size:9px">${a.tipo}</span>
          ${o.length?`<span style="font-size:8px;background:rgba(0,0,0,.15);padding:1px 4px;border-radius:3px">${o.length} órd.</span>`:''}
        </div>`;
      }).join('');
      rows+=`<div class="dhr">${h>12?h-12:h}:00 ${h>=12?'PM':'AM'}</div><div class="dcl">${evs||''}</div>`;
    });
    bodyH=`<div class="dgr">${rows}</div>
    ${dayApts.length>0?`<div class="cd" style="margin-top:10px"><div class="cdh"><h3>Citas del día (${dayApts.length})</h3></div>
    <div class="tw"><table><thead><tr><th>Hora</th><th>Paciente</th><th>Empresa</th><th>Tipo</th><th>Estado</th><th>Exám.</th><th>Acc.</th></tr></thead><tbody>
    ${dayApts.map(a=>{const p=gP(a.pid);const o=gAO(a.id);return`<tr>
      <td class="mono" style="font-weight:600">${fT(a.hora)}</td>
      <td class="clk" onclick="nav('det',{p:gP('${a.pid}')})">${p?.nombre||'—'}</td>
      <td style="font-size:11px">${p?.empresa||''}</td><td>${a.tipo}</td>
      <td><span class="ba ${EB[a.estado]}">${EL[a.estado]}</span></td>
      <td>${a.exAsig?`<span class="ba ba-t">${o.length} órd.</span>`:'<span class="ba ba-w">—</span>'}</td>
      <td style="display:flex;gap:2px"><button class="abtn ${a.asistio===true?'y':''}" onclick="mrkA('${a.id}',true)">${ic('chk',12)}</button><button class="abtn ${a.asistio===false?'n':''}" onclick="mrkA('${a.id}',false)">${ic('x',12)}</button><button class="btn bsm bw" style="font-size:9px;padding:2px 6px" onclick="sendReminder(S.apt.find(x=>x.id==='${a.id}'))">📤</button></td></tr>`;}).join('')}</tbody></table></div></div>`:
    `<div class="es" style="margin-top:10px"><h4>Sin citas este día</h4></div>`}`;
  }

  // Today button
  const todayBtn=`<button class="btn bsm bg" onclick="S.cDate=new Date();render()" style="font-size:10px">📅 Hoy</button>`;

  return`<div class="ph"><div style="display:flex;align-items:center;gap:10px">${getEmpCfg().logo?`<img src="${getEmpCfg().logo}" style="width:${getEmpCfg().logo_size||40}px;object-fit:contain;border-radius:6px">`:''}<h2>Calendario</h2>${tabs}</div><div style="display:flex;gap:6px">${todayBtn}<button class="btn bp" onclick="amMod()">${ic('pls')} Nueva Cita</button></div></div>
  <div class="cd"><div class="cdh"><div style="display:flex;align-items:center;gap:12px">${navH}</div></div>
  <div class="cdb">${bodyH}</div></div>`;
}

  return`<div class="ph"><div><h2>Pacientes</h2><p class="ph-s">${S.pts.length} registrados</p></div><div style="display:flex;gap:8px"><div class="sb"><input class="fi" placeholder="Buscar..." value="${S.q}" oninput="S.q=this.value;render()" style="padding-left:10px"></div><button class="btn bp" onclick="pmMod()">${ic('pls')} Nuevo</button></div></div>

// ═══ NURSING ═══
if(!S.nrsFilter)S.nrsFilter='hoy';

function getNrsDate(){
  const h=new Date();
  if(S.nrsFilter==='hoy')return TD;
  if(S.nrsFilter==='manana'){
    const m=new Date(h);m.setDate(m.getDate()+1);return m.toISOString().split('T')[0];
  }
  if(S.nrsFilter==='semana'){return 'semana';}
  if(S.nrsFilter==='custom')return S.nrsCustomDate||TD;
  return TD;
}

function rNrs(){
  const fd=getNrsDate();
  let tA;
  if(fd==='semana'){
    const h=new Date();
    const dom=new Date(h);dom.setDate(dom.getDate()-dom.getDay());
    const sab=new Date(dom);sab.setDate(sab.getDate()+6);
    const desde=dom.toISOString().split('T')[0];
    const hasta=sab.toISOString().split('T')[0];
    tA=S.apt.filter(a=>a.fecha>=desde&&a.fecha<=hasta&&a.estado!=='cancelada');
  }else{
    tA=S.apt.filter(a=>a.fecha===fd&&a.estado!=='cancelada');
  }
  tA.sort((a,b)=>(a.fecha+a.hora).localeCompare(b.fecha+b.hora));

  const pending=tA.filter(a=>!a.exAsig).length;
  const inProcess=tA.filter(a=>a.exAsig&&a.estado!=='completada').length;

  // Date labels
  const manana=new Date();manana.setDate(manana.getDate()+1);
  const mananaStr=manana.toISOString().split('T')[0];

  let cards='';
  tA.forEach(a=>{
    const p=gP(a.pid);
    const o=gAO(a.id);
    const done=o.filter(x=>x.estado==='completado').length;
    const total=o.length;
    const pct=total>0?Math.round(done/total*100):0;

    let ordH='';
    if(o.length>0){
      ordH=o.map(x=>{
        const isDone=x.estado==='completado';
        const icon=cI[x.cat]||'📋';
        const label=x.cat==='laboratorio'?`Lab: ${(x.exams||[]).join(', ')}`:x.cat==='radiologia'?`RX: ${x.parte} (${x.proy})`:(x.exams||[])[0]||x.cat;
        return`<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:${isDone?'var(--oks)':'var(--ci)'};border:1px solid ${isDone?'var(--ok)':'var(--bd)'};border-radius:6px;cursor:${isDone?'default':'pointer'};transition:all .2s" ${isDone?'':`onclick="updO('${x.id}',{estado:'completado'})"`}>
          <div style="width:22px;height:22px;border-radius:6px;border:2px solid ${isDone?'var(--ok)':'var(--bd)'};background:${isDone?'var(--ok)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s">
            ${isDone?'<span style="color:white;font-size:12px">✓</span>':''}
          </div>
          <span style="font-size:12px;${isDone?'text-decoration:line-through;opacity:.6':''}">${icon} ${label}</span>
        </div>`;
      }).join('');
    }

    cards+=`<div class="cd" style="margin-bottom:10px">
      <div class="cdh" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="uav uav-e" style="width:36px;height:36px;font-size:12px">${ini(p?.nombre||'?')}</div>
          <div>
            <div style="font-weight:700;font-size:14px">${p?.nombre||'—'}</div>
            <div style="font-size:11px;color:var(--tm)">${p?.empresa||''} · ${a.tipo} · <span class="mono">${fT(a.hora)}</span> · ${fD(a.fecha)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="ba ${EB[a.estado]}">${EL[a.estado]}</span>
          ${total>0?`<span style="font-size:10px;color:${pct===100?'var(--ok)':'var(--tm)'};font-weight:600">${done}/${total} (${pct}%)</span>`:''}
          <button class="btn bsm ${a.exAsig?'bg':'bt'}" onclick="exMod('${a.id}')">${a.exAsig?'✏️ Editar':'➕ Asignar'}</button>
          ${p?.telefono?`<button class="btn bsm" style="background:#25d366;color:#fff" onclick="sendWA('${a.id}','confirmacion')">📱 WhatsApp</button>`:''}
        </div>
      </div>
      ${total>0?`<div class="cdb">
        ${pct>0?`<div style="height:4px;background:var(--ci);border-radius:4px;margin-bottom:10px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pct===100?'var(--ok)':'var(--a)'};border-radius:4px;transition:width .3s"></div></div>`:''}
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px">
          ${ordH}
        </div>
        ${pct===100?'<div style="margin-top:8px;text-align:center;font-size:12px;color:var(--ok);font-weight:600">✅ Todos los servicios completados</div>':''}
      </div>`:`<div class="cdb" style="text-align:center;padding:12px;color:var(--tm);font-size:12px">Sin exámenes asignados — haz clic en ➕ Asignar</div>`}
    </div>`;
  });

  return`<div class="ph"><div><h2>🩺 Panel de Enfermería</h2><p class="ph-s">${tA.length} pacientes · ${pending} sin asignar · ${inProcess} en proceso · <span style="color:var(--ok)">🔄 Auto-actualiza</span></p></div></div>

  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
    <button class="btn bsm ${S.nrsFilter==='hoy'?'bp':'bt'}" onclick="S.nrsFilter='hoy';render()">📅 Hoy</button>
    <button class="btn bsm ${S.nrsFilter==='manana'?'bp':'bt'}" onclick="S.nrsFilter='manana';render()">📅 Mañana</button>
    <button class="btn bsm ${S.nrsFilter==='semana'?'bp':'bt'}" onclick="S.nrsFilter='semana';render()">📅 Esta Semana</button>
    <input type="date" class="fi" style="width:140px;padding:4px 8px;font-size:11px" value="${S.nrsCustomDate||''}" onchange="S.nrsCustomDate=this.value;S.nrsFilter='custom';render()">
    ${S.nrsFilter==='manana'&&tA.length>0?`<button class="btn bsm" style="background:#25d366;color:#fff;margin-left:auto" onclick="sendWABulk('${mananaStr}')">📱 WhatsApp recordatorio a todos (${tA.length})</button>`:''}
  </div>

  <div class="cd" style="margin-bottom:12px"><div class="cdh"><h3>📥 Descargar Lista de Atendidos (Excel/CSV)</h3></div><div class="cdb">
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <button class="btn bsm bt" onclick="downloadExcelAtendidos('hoy')">📅 Hoy</button>
      <button class="btn bsm bt" onclick="downloadExcelAtendidos('semana')">📅 Esta Semana</button>
      <button class="btn bsm bt" onclick="downloadExcelAtendidos('mes')">📅 Este Mes</button>
      <button class="btn bsm bp" onclick="downloadExcelAtendidos('todo')">📋 Todo</button>
      <span style="color:var(--tm);font-size:11px;margin:0 4px">ó</span>
      <input type="date" class="fi" id="xl_desde" style="width:130px;padding:4px 8px;font-size:11px">
      <span style="font-size:11px;color:var(--tm)">a</span>
      <input type="date" class="fi" id="xl_hasta" style="width:130px;padding:4px 8px;font-size:11px">
      <button class="btn bsm bs" onclick="downloadExcelAtendidos('custom')">📥 Descargar</button>
    </div>
  </div></div>

  ${tA.length===0?'<div class="cd"><div class="es"><h4>Sin citas pendientes</h4></div></div>':cards}`;
}

// ═══ LAB ORDERS (lab role: only lab) ═══

      <div class="fg" style="flex:1"><label>Nombre del Cargo *</label><input class="fi" id="cg_nom" value="${d.nombre||''}" placeholder="Ej: Conductor de Camiones Pesados"></div>
    </div>
  </div><div class="mft"><button class="btn bg" onclick="closeModal()">Cancelar</button><button class="btn bp" onclick="svCargo('${d.id||''}')">${c?'Guardar':'Crear'}</button></div>`);

async function svCargo(cid){
  const codigo=document.getElementById('cg_cod')?.value?.trim();
  const nombre=document.getElementById('cg_nom')?.value?.trim();
  if(!codigo||!nombre){alert('Código y nombre son obligatorios');return;}
  if(!S.cargos_ciuo)S.cargos_ciuo=[];
  if(cid){
    const i=S.cargos_ciuo.findIndex(c=>c.id===cid);
    if(i>-1){
      S.cargos_ciuo[i].codigo=codigo;S.cargos_ciuo[i].nombre=nombre;
      if(DB_OK)await SB.patch('cargos_ciuo',{codigo,nombre},`id=eq.${cid}`);
    }
  }else{
    if(DB_OK){
      const r=await SB.post('cargos_ciuo',{codigo,nombre});
      if(r&&r[0])S.cargos_ciuo.push({id:r[0].id,codigo,nombre});
      else S.cargos_ciuo.push({id:gid(),codigo,nombre});
    }else{S.cargos_ciuo.push({id:gid(),codigo,nombre});}
  }
  closeModal();render();
  alert(`✅ Cargo ${cid?'actualizado':'registrado'}: (${codigo}) ${nombre}`);
}

async function delCargo(cid){
  const c=(S.cargos_ciuo||[]).find(x=>x.id===cid);
  if(!c)return;
  if(!confirm(`¿Eliminar el cargo "${c.nombre}"?`))return;
  S.cargos_ciuo=S.cargos_ciuo.filter(x=>x.id!==cid);
  if(DB_OK)await SB.del('cargos_ciuo',`id=eq.${cid}`);
  render();
}

async function svCie10(cid){
  const codigo=document.getElementById('dx_cod')?.value?.trim().toUpperCase();
  const descripcion=document.getElementById('dx_desc')?.value?.trim();
  if(!codigo||!descripcion){alert('Código y descripción son obligatorios');return;}
  if(!S.cie10)S.cie10=[];
  if(cid){
    const i=S.cie10.findIndex(c=>c.id===cid);
    if(i>-1){
      S.cie10[i].codigo=codigo;S.cie10[i].descripcion=descripcion;
      if(DB_OK)await SB.patch('cie10',{codigo,descripcion},`id=eq.${cid}`);
    }
  }else{
    // Verificar si ya existe
    const existe=S.cie10.find(c=>c.codigo===codigo);
    if(existe){alert(`El código ${codigo} ya existe: ${existe.descripcion}`);return;}
    if(DB_OK){
      const r=await SB.post('cie10',{codigo,descripcion});
      if(r&&r[0])S.cie10.push({id:r[0].id,codigo,descripcion});
      else S.cie10.push({id:gid(),codigo,descripcion});
    }else{S.cie10.push({id:gid(),codigo,descripcion});}
  }
  closeModal();render();
  alert(`✅ Diagnóstico ${cid?'actualizado':'registrado'}: ${codigo} — ${descripcion}`);
}

async function delCie10(cid){
  const c=(S.cie10||[]).find(x=>x.id===cid);
  if(!c)return;
  if(!confirm(`¿Eliminar ${c.codigo} — ${c.descripcion}?`))return;
  S.cie10=S.cie10.filter(x=>x.id!==cid);
  if(DB_OK)await SB.del('cie10',`id=eq.${cid}`);
  render();
}

// ═══ MEDICAL APPOINTMENT CONFIG ═══
function getMedCfg(){
  try{const v=localStorage.getItem('mediagenda_med_cfg');if(v)return JSON.parse(v);}catch(e){}
  return {inicio_h:10,inicio_m:0,fin_h:17,fin_m:0,intervalo:20};
}
async function saveMedCfg(){
  const ih=+document.getElementById('cfg_med_ih').value;
  const im=+document.getElementById('cfg_med_im').value;
  const fh=+document.getElementById('cfg_med_fh').value;
  const fm=+document.getElementById('cfg_med_fm').value;
  const iv=+document.getElementById('cfg_med_int').value;
  if(fh*60+fm<=ih*60+im){alert('La hora fin debe ser después de la hora inicio');return;}
  if(iv<5||iv>120){alert('El intervalo debe ser entre 5 y 120 minutos');return;}
  const cfg={inicio_h:ih,inicio_m:im,fin_h:fh,fin_m:fm,intervalo:iv};
  localStorage.setItem('mediagenda_med_cfg',JSON.stringify(cfg));
  if(DB_OK)await SB.patch('configuracion',{valor:JSON.stringify(cfg)},"clave=eq.med_cfg");
  render();
  const total=Math.floor(((fh*60+fm)-(ih*60+im))/iv);
  alert(`✅ Horario de citas médicas actualizado\nDesde ${ih>12?ih-12:ih}:${String(im).padStart(2,'0')} ${ih>=12?'PM':'AM'} hasta ${fh>12?fh-12:fh}:${String(fm).padStart(2,'0')} ${fh>=12?'PM':'AM'}\nIntervalo: cada ${iv} min\nCupos disponibles: ${total}`);
}
function getMedSlots(){
  const c=getMedCfg();const slots=[];
  let cur=c.inicio_h*60+c.inicio_m;const fin=c.fin_h*60+c.fin_m;
  while(cur<fin){
    const hh=String(Math.floor(cur/60)).padStart(2,'0');
    const mm=String(cur%60).padStart(2,'0');
    slots.push(`${hh}:${mm}`);cur+=c.intervalo;
  }
  return slots;
}

// ═══ BACKUP SYSTEM ═══
const MAX_BKP=10;
function getBkps(){return JSON.parse(localStorage.getItem('mediagenda_backups')||'[]');}
function saveBkps(b){localStorage.setItem('mediagenda_backups',JSON.stringify(b));}

function genBkp(){
  const data={
    version:'MediAgenda-v3',
    fecha:new Date().toISOString(),
    pacientes:S.pts,
    citas:S.apt,
    ordenes:S.ord,
    usuarios:S.usrs,
    catalogo_lab:LAB,
  };
  // Save internal
  let bkps=getBkps();
  bkps.unshift({id:gid(),fecha:data.fecha,data:data});
  if(bkps.length>MAX_BKP)bkps=bkps.slice(0,MAX_BKP);
  saveBkps(bkps);
  // Download JSON
  const jsonStr=JSON.stringify(data,null,2);
  const blob=new Blob([jsonStr],{type:'application/json'});
  const fn=`MediAgenda_Respaldo_${new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')}.json`;
  dlFile(blob,fn);
  // Download Excel CSV
  genExcelBkp(data);
  render();
  alert('✅ Respaldo #'+(getBkps().length)+' generado\n📥 JSON descargado\n📊 Excel descargado');
}

function genExcelBkp(data){
  // Generate CSV (opens perfectly in Excel)
  let csv='\uFEFF'; // BOM for UTF-8 in Excel
  // Sheet: Pacientes
  csv+='=== PACIENTES ===\n';
  csv+='Nombre,Cédula,Teléfono,Email,Género,Dirección,Ciudad,Empresa,Cargo,Fecha Nac.\n';
  (data.pacientes||[]).forEach(p=>{
    csv+=`"${p.nombre||''}","${p.cedula||''}","${p.telefono||''}","${p.email||''}","${p.genero||''}","${p.direccion||''}","${p.ciudad||''}","${p.empresa||''}","${p.cargo||''}","${p.fecha_nacimiento||''}"\n`;
  });
  csv+='\n=== CITAS ===\n';
  csv+='Paciente,Empresa,Tipo,Fecha,Hora,Estado,Exámenes Asignados\n';
  (data.citas||[]).forEach(a=>{
    const p=(data.pacientes||[]).find(x=>x.id===a.pid);
    csv+=`"${p?.nombre||''}","${p?.empresa||''}","${a.tipo||''}","${a.fecha||''}","${a.hora||''}","${a.estado||''}","${a.exAsig?'Sí':'No'}"\n`;
  });
  csv+='\n=== ÓRDENES MÉDICAS ===\n';
  csv+='Paciente,Empresa,Categoría,Detalle,Estado\n';
  (data.ordenes||[]).forEach(o=>{
    const p=(data.pacientes||[]).find(x=>x.id===o.pid);
    const det=o.cat==='radiologia'?`${o.parte} - ${o.proy}`:(o.exams||[]).join(', ');
    csv+=`"${p?.nombre||''}","${p?.empresa||''}","${o.cat||''}","${det}","${o.estado||''}"\n`;
  });
  csv+='\n=== USUARIOS ===\n';
  csv+='Nombre,Cédula,Rol,Activo\n';
  (data.usuarios||[]).forEach(u=>{
    csv+=`"${u.nombre||''}","${u.cedula||''}","${u.rol||''}","${u.activo?'Sí':'No'}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const fn=`MediAgenda_Respaldo_${new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')}.csv`;
  dlFile(blob,fn);
}

function dlFile(blob,fn){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fn;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function restoreBkp(idx){
  const bkps=getBkps();
  if(!bkps[idx]){alert('Respaldo no encontrado');return;}
  if(!confirm('⚠️ ¿Restaurar este respaldo?\nSe reemplazarán TODOS los datos actuales.'))return;
  applyBkp(bkps[idx].data);
}

function applyBkp(data){
  if(!data||data.version!=='MediAgenda-v3'){alert('❌ Archivo no válido o versión incompatible');return;}
  S.pts=data.pacientes||[];
  S.apt=data.citas||[];
  S.ord=data.ordenes||[];
  S.usrs=data.usuarios||[];
  if(data.catalogo_lab){LAB=data.catalogo_lab;saveLAB();}
  // Re-login needed
  const currentUser=S.usrs.find(u=>u.id===S.u?.id);
  if(currentUser){S.u=currentUser;}else{S.u=S.usrs[0]||null;}
  render();
  alert('✅ Respaldo restaurado correctamente\nPacientes: '+S.pts.length+'\nCitas: '+S.apt.length+'\nÓrdenes: '+S.ord.length+'\nUsuarios: '+S.usrs.length);
}

function deleteBkp(idx){
  if(!confirm('¿Eliminar este respaldo?'))return;
  let bkps=getBkps();bkps.splice(idx,1);saveBkps(bkps);render();
}

function downloadBkp(idx){
  const bkps=getBkps();if(!bkps[idx])return;
  const d=bkps[idx].data;
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  dlFile(blob,`MediAgenda_Respaldo_${bkps[idx].fecha.slice(0,19).replace(/[T:]/g,'-')}.json`);
}

function uploadBkp(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.version||data.version!=='MediAgenda-v3'){alert('❌ Archivo no válido');return;}
        if(!confirm(`¿Restaurar respaldo del ${new Date(data.fecha).toLocaleString('es-EC')}?\n\nPacientes: ${(data.pacientes||[]).length}\nCitas: ${(data.citas||[]).length}\nÓrdenes: ${(data.ordenes||[]).length}\nUsuarios: ${(data.usuarios||[]).length}\n\n⚠️ Se reemplazarán todos los datos actuales.`))return;
        applyBkp(data);
      }catch(err){alert('❌ Error leyendo archivo: '+err.message);}
    };
    reader.readAsText(f);
  };
  inp.click();
}

// ═══ EMPRESA CONFIG ═══
function getEmpCfgRaw(){try{return JSON.parse(localStorage.getItem('mediagenda_emp')||'{}');}catch(e){return{};}}
function getEmpCfg(){
  const def={nombre:CFG.CLINIC,direccion:CFG.ADDR,email:'',telefono:'',wa_phone:CFG.WA_PHONE||'',wa_token:'',wa_phone_id:'',logo:'',logo_size:80,logo_pos:'left'};
  return{...def,...getEmpCfgRaw()};
}

async function saveEmpCfg(){
  const cfg={
    nombre:document.getElementById('cfg_nombre').value.trim(),
    direccion:document.getElementById('cfg_addr').value.trim(),
    maps_url:document.getElementById('cfg_maps').value.trim(),
    email:document.getElementById('cfg_email').value.trim(),
    telefono:document.getElementById('cfg_tel').value.trim(),
    wa_phone:document.getElementById('cfg_wa').value.trim(),
    wa_token:document.getElementById('cfg_wa_token').value.trim(),
    wa_phone_id:document.getElementById('cfg_wa_pid').value.trim(),
  };
  const prev=getEmpCfg();
  const merged={...prev,...cfg};
  localStorage.setItem('mediagenda_emp',JSON.stringify(merged));
  CFG.CLINIC=merged.nombre||CFG.CLINIC;CFG.ADDR=merged.direccion||CFG.ADDR;
  CFG.WA_PHONE=merged.wa_phone;CFG.WA_TOKEN=merged.wa_token;CFG.WA_PHONE_ID=merged.wa_phone_id;
  if(DB_OK)await SB.patch('configuracion',{valor:JSON.stringify(merged)},"clave=eq.empresa");
  render();alert('✅ Datos de empresa guardados');
}

function loadLogoFile(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    document.getElementById('cfg_logo').value=e.target.result;
    const prev=document.getElementById('logo_prev');
    if(prev.tagName==='IMG'){prev.src=e.target.result;}
    else{prev.outerHTML=`<img id="logo_prev" src="${e.target.result}" style="width:${getEmpCfg().logo_size||80}px;border-radius:8px">`;}
  };
  r.readAsDataURL(f);
}

async function saveLogoCfg(){
  const logo=document.getElementById('cfg_logo').value.trim();
  const size=+document.getElementById('cfg_logo_size').value;
  const pos=document.getElementById('cfg_logo_pos').value;
  const prev=getEmpCfg();
  const merged={...prev,logo,logo_size:size,logo_pos:pos};
  localStorage.setItem('mediagenda_emp',JSON.stringify(merged));
  if(DB_OK)await SB.patch('configuracion',{valor:JSON.stringify(merged)},"clave=eq.empresa");
  render();alert('✅ Logo guardado');
}

function certAptMod(pid,aid){

    <div class="fg"><label>RUC</label><input class="fi" id="ca_ruc" value="${emp.ruc||''}"></div>
    <div class="fg"><label>CIIU</label><input class="fi" id="ca_ciiu" value="${emp.ciiu||''}"></div></div>
    <div class="fr"><div class="fg" style="flex:2"><label>Establecimiento / Centro de Trabajo</label><input class="fi" id="ca_centro" value="${emp.nombre||p.empresa||''}"></div>
    <div class="fg"><label>N° Formulario</label><input class="fi" id="ca_nform" value="${p.cedula||''}"></div>
    <div class="fg"><label>N° Archivo</label><input class="fi" id="ca_narch" value="${p.cedula||''}"></div></div>

    <div class="fr"><div class="fg"><label>Primer Apellido</label><input class="fi" id="ca_ap1" value="${ap1}"></div>
    <div class="fg"><label>Segundo Apellido</label><input class="fi" id="ca_ap2" value="${ap2}"></div>
    <div class="fg"><label>Primer Nombre</label><input class="fi" id="ca_n1" value="${n1}"></div>

function certEmpChange(){
  const v=document.getElementById('ca_empresa')?.value;
  const e=(S.empresas_cli||[]).find(x=>x.nombre===v);
  if(e){
    document.getElementById('ca_ruc').value=e.ruc||'';
    document.getElementById('ca_ciiu').value=e.ciiu||'';
    document.getElementById('ca_centro').value=e.nombre||'';
  }
}

function saveMedCfgFromCert(){
  const nombre=document.getElementById('ca_medico')?.value?.trim()||'';
  const codigo=document.getElementById('ca_codmed')?.value?.trim()||'';
  if(nombre||codigo){localStorage.setItem('mediagenda_med_cfg',JSON.stringify({...getMedCfg(),nombre,codigo}));}
}

// ═══ FICHA OCUPACIONAL (14 secciones) ═══
let FO={pid:null,fid:null,sec:'A',data:{}};

function openFicha(pid,aid){
  FO.pid=pid;FO.sec='A';FO.data={};FO.fid=null;
  const p=gP(pid);if(!p)return;
  // Buscar ficha existente del paciente
  if(DB_OK){
    SB.get('fichas_ocupacionales',`select=*&paciente_id=eq.${pid}&order=created_at.desc&limit=1`).then(r=>{
      if(r&&r[0]){FO.fid=r[0].id;FO.data={a:r[0].seccion_a||{},b:r[0].seccion_b||{},c:r[0].seccion_c||{},d:r[0].seccion_d||{},e:r[0].seccion_e||{},f:r[0].seccion_f||{},g:r[0].seccion_g||{},h:r[0].seccion_h||{},i:r[0].seccion_i||{},j:r[0].seccion_j||{},k:r[0].seccion_k||{},l:r[0].seccion_l||{},m:r[0].seccion_m||{},n:r[0].seccion_n||{},r:r[0].seccion_r||{}};}
      else{preloadFichaData(p);}
      S.v='ficha';render();
    });
  }else{preloadFichaData(p);S.v='ficha';render();}
}

function preloadFichaData(p){
  const emp=(S.empresas_cli||[]).find(e=>e.nombre?.toLowerCase()===p.empresa?.toLowerCase())||{};
  const cargo=(S.cargos_ciuo||[]).find(c=>c.nombre?.toLowerCase()===p.cargo?.toLowerCase())||{};
  const partes=(p.nombre||'').toUpperCase().split(' ');
  let ap1='',ap2='',n1='',n2='';
  if(partes.length>=4){ap1=partes[0];ap2=partes[1];n1=partes[2];n2=partes.slice(3).join(' ');}
  else if(partes.length===3){ap1=partes[0];ap2='';n1=partes[1];n2=partes[2];}
  else if(partes.length===2){ap1=partes[0];n1=partes[1];}else{n1=p.nombre||'';}
  const mc=getMedCfg();
  FO.data={
    a:{empresa:emp.nombre||p.empresa||'',ruc:emp.ruc||'',ciiu:emp.ciiu||'',centro:emp.nombre||p.empresa||'',nform:p.cedula||'',narch:p.cedula||'',ap1,ap2,n1,n2,sexo:p.genero==='masculino'?'M':p.genero==='femenino'?'F':'',cargo:cargo.codigo?`(${cargo.codigo}) ${p.cargo||''}`:(p.cargo||''),grupo_sang:'',lateralidad:'Diestro',atencion_prioritaria:[]},
    b:{puesto_ciuo:p.cargo||'',fecha_atencion:TD,tipo_eval:'INGRESO',fecha_ingreso:'',observacion:''},
    c:{ant_clinicos:'APP: Niega\nAQx: Niega\nAlergias: Niega\nAPsi: Niega',ant_familiares:'Niega',aut_transfusion:'No',trat_hormonal:'No',trat_hormonal_detalle:'',reprod_exam:'',reprod_tiempo:'',reprod_planif:'No',sustancias:[{nombre:'Tabaco',estado:'Nunca',consumo:'',abstinencia:''},{nombre:'Alcohol',estado:'Nunca',consumo:'',abstinencia:''}],actividad_fisica:[],medicacion:'Ninguna'},
    d:{descripcion:''},
    e:{temp:'36.5',pa_s:'120',pa_d:'80',fc:'70',fr:'16',sat:'98',peso:'',talla:'',imc:'',clasif_imc:'',perim_abd:''},
    f:{hallazgos:{},observaciones:''},
    g:loadRiesgoPlantilla(p.cargo)||{riesgos:{},medidas:'USO DE PRENDAS DE PREVENCIÓN\nPAUSAS ACTIVAS\nCUMPLIMIENTO DE PROTOCOLOS DE BIOSEGURIDAD Y TRABAJO SEGURO'},
    h:{empleos:[{centro:p.empresa||'',cargo:p.cargo||'',estado:'ACTUAL',tiempo:'',inc_data:{}}]},
    i:{actividades:[]},
    j:{categorias:[],observaciones:''},
    k:{diagnosticos:[]},
    l:{aptitud:'',observaciones:''},
    m:{estandar:[],medicas:''},
    n:{medico:mc.nombre||S.u?.nombre||'',codigo:mc.codigo||''},r:{se_realiza:'SÍ',condicion_trabajo:'NO',observacion:'NINGUNA'}
  };
}

function rFichaOcup(){
  const p=gP(FO.pid);if(!p)return'<div class="es">Paciente no encontrado</div>';
  const emp=(S.empresas_cli||[]).find(e=>e.nombre?.toLowerCase()===p.empresa?.toLowerCase())||{};
  const isRetiro=(FO.data.b||{}).tipo_eval==='RETIRO';
  const secs=[
    {k:'A',t:'Datos del Paciente',i:'👤'},
    {k:'B',t:'Motivo Consulta',i:'📋'},
    {k:'C',t:'Antecedentes',i:'📖'},
    {k:'D',t:'Enfermedad Actual',i:'🤒'},
    {k:'E',t:'Constantes Vitales',i:'💓'},

  const prog=calcFichaProgress();
  const edad=p.fecha_nacimiento?Math.floor((new Date()-new Date(p.fecha_nacimiento))/(365.25*86400000)):'-';

  return`<div style="background:linear-gradient(135deg,#1e3a5f,#2c5282);color:#fff;padding:14px 20px;border-radius:10px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">

      <div style="font-size:16px;font-weight:700">${p.nombre?.toUpperCase()||''}</div>

        <span>CÉDULA: ${p.cedula||'-'}</span> &nbsp;|&nbsp; <span>EDAD: ${edad} años</span> &nbsp;|&nbsp; <span>SEXO: ${p.genero||'-'}</span>
      </div>
      <div style="font-size:11px;opacity:.75;margin-top:2px">
        <span>EMPRESA: ${p.empresa||'-'}</span> &nbsp;|&nbsp; <span>RUC: ${emp.ruc||'-'}</span> &nbsp;|&nbsp; <span>CIIU: ${emp.ciiu||'-'}</span>
      </div>
    </div>
    <div style="text-align:center;min-width:120px">

function calcFichaProgress(){
  const d=FO.data;if(!d||!d.a)return 0;
  const isRetiro=(d.b||{}).tipo_eval==='RETIRO';
  let filled=0,total=isRetiro?15:14;
  if(d.a?.empresa)filled++;
  if(d.b?.tipo_eval)filled++;
  if(d.c?.ant_clinicos||d.c?.ant_familiares)filled++;
  if(d.d?.descripcion)filled++;
  if(d.e?.peso&&d.e?.talla)filled++;
  if(d.f?.observaciones||Object.keys(d.f?.hallazgos||{}).length)filled++;
  if((d.g?.fisicos||[]).length||(d.g?.quimicos||[]).length||(d.g?.ergonomicos||[]).length)filled++;
  if((d.h?.empleos||[]).length&&d.h.empleos[0]?.centro)filled++;
  if((d.i?.actividades||[]).length)filled++;
  if((d.j?.examenes||[]).length)filled++;
  if((d.k?.diagnosticos||[]).length)filled++;
  if(d.l?.aptitud)filled++;
  if(d.m?.medicas||(d.m?.estandar||[]).length)filled++;
  if(isRetiro&&d.r?.se_realiza)filled++;
  if(d.n?.medico)filled++;
  return Math.round(filled/total*100);
}

function validateFichaRequired(){
  const d=FO.data;const a=d.a||{};
  const missing=[];
  if(!a.ap1 || a.ap1.length===0) missing.push('Primer Apellido');
  if(!a.ap2 || a.ap2.length===0) missing.push('Segundo Apellido');
  if(!a.n1 || a.n1.length===0) missing.push('Primer Nombre');
  if(!a.n2 || a.n2.length===0) missing.push('Segundo Nombre');
  if(!a.sexo || a.sexo==='' || a.sexo==='--') missing.push('Sexo');
  return missing;
}

function fichaNav(dir){
  saveFichaSection();
  // Validar campos obligatorios al salir de sección A
  if(FO.sec==='A' && dir===1){
    const missing=validateFichaRequired();
    if(missing.length){
      showFichaError(missing);
      return;
    }
  }
  const isRetiro=(FO.data.b||{}).tipo_eval==='RETIRO';
  const keys=isRetiro?['A','B','C','D','E','F','G','H','I','J','K','L','M','R','N']:['A','B','C','D','E','F','G','H','I','J','K','L','M','N'];
  const i=keys.indexOf(FO.sec)+dir;
  if(i>=0&&i<keys.length){FO.sec=keys[i];render();}
}
function fichaGoSec(k){
  saveFichaSection();
  // Si va a otra sección diferente de A, validar obligatorios
  if(FO.sec==='A' && k!=='A'){
    const missing=validateFichaRequired();
    if(missing.length){
      showFichaError(missing);
      return;
    }
  }
  FO.sec=k;render();
}

function showFichaError(missing){
  // Resaltar campos vacíos con borde rojo
  const fieldMap={'Primer Apellido':'fo_ap1','Segundo Apellido':'fo_ap2','Primer Nombre':'fo_n1','Segundo Nombre':'fo_n2','Sexo':'fo_sexo'};
  missing.forEach(m=>{
    const id=fieldMap[m];
    if(id){const el=document.getElementById(id);if(el){el.style.border='2px solid red';el.style.background='#fff5f5';}}
  });
  // Mostrar mensaje visual
  let box=document.getElementById('ficha_error_msg');
  if(!box){box=document.createElement('div');box.id='ficha_error_msg';const parent=document.getElementById('ficha_sec_body');if(parent)parent.prepend(box);}
  if(box){
    box.innerHTML=`<div style="background:#fed7d7;border:2px solid #fc8181;border-radius:8px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px">
      <span style="font-size:22px">⚠️</span>
      <div><div style="font-weight:700;color:#c53030;font-size:14px;margin-bottom:6px">Faltan campos obligatorios</div>
      <div style="font-size:12px;color:#9b2c2c;line-height:1.6">${missing.map(m=>'• '+m).join('<br>')}</div></div></div>`;
    box.scrollIntoView({behavior:'smooth',block:'start'});
  } else {
    // Fallback si no encuentra el contenedor
    alert('⚠️ FALTAN CAMPOS OBLIGATORIOS:\n\n'+missing.map(m=>'• '+m).join('\n')+'\n\nComplete todos los campos marcados con * para continuar.');
  }
}

function saveFichaSection(){
  const s=FO.sec;const d=FO.data;
  if(s==='A'){
    d.a={...d.a,empresa:gv('fo_empresa'),ruc:gv('fo_ruc'),ciiu:gv('fo_ciiu'),centro:gv('fo_centro'),nform:gv('fo_nform'),narch:gv('fo_narch'),ap1:gv('fo_ap1'),ap2:gv('fo_ap2'),n1:gv('fo_n1'),n2:gv('fo_n2'),sexo:gv('fo_sexo'),cargo:gv('fo_cargo'),grupo_sang:gv('fo_gsang'),lateralidad:d.a?.lateralidad||'Diestro',atencion_prioritaria:d.a?.atencion_prioritaria||[]};
    // Actualizar datos del paciente si se editaron
    const p=gP(FO.pid);
    if(p){
      const newCed=gv('fo_cedula');const newFn=gv('fo_fnac');
      if(newCed)p.cedula=newCed;
      if(newFn)p.fecha_nacimiento=newFn;
    }
  }else if(s==='B'){
    d.b={puesto_ciuo:gv('fo_puesto'),fecha_atencion:gv('fo_fecha_at'),tipo_eval:d.b?.tipo_eval||'INGRESO',fecha_ingreso:gv('fo_fingreso'),observacion:gv('fo_b_obs')};
  }else if(s==='C'){
    d.c={...d.c,ant_clinicos:gv('fo_antclin'),ant_familiares:gv('fo_antfam'),medicacion:gv('fo_medic')};
  }else if(s==='D'){
    d.d={descripcion:gv('fo_enfactual')};
  }else if(s==='E'){
    d.e={temp:gv('fo_temp'),pa_s:gv('fo_pas'),pa_d:gv('fo_pad'),fc:gv('fo_fc'),fr:gv('fo_fr'),sat:gv('fo_sat'),peso:gv('fo_peso'),talla:gv('fo_talla'),imc:gv('fo_imc'),clasif_imc:gv('fo_cimc'),perim_abd:gv('fo_pabd')};
  }else if(s==='F'){
    d.f={...d.f,observaciones:gv('fo_f_obs')};
  }else if(s==='G'){
    d.g={...d.g,medidas:gv('fo_g_medidas')};
  }else if(s==='J'){
    d.j={...d.j,observaciones:gv('fo_j_obs')};
  }else if(s==='L'){
    d.l={...d.l,observaciones:gv('fo_l_obs')};
  }else if(s==='M'){
    d.m={...d.m,medicas:gv('fo_m_med')};
  }else if(s==='R'){
    d.r={...d.r,se_realiza:d.r?.se_realiza||'',condicion_trabajo:d.r?.condicion_trabajo||'',observacion:gv('fo_r_obs')};
  }else if(s==='N'){
    d.n={medico:gv('fo_medico'),codigo:gv('fo_codmed')};
  }
}
function gv(id){return document.getElementById(id)?.value||'';}

function fichaSecContent(s){
  const d=FO.data;const a=d.a||{};const b=d.b||{};const c=d.c||{};const e=d.e||{};const f=d.f||{};const h=d.h||{};const j=d.j||{};const k=d.k||{};const l=d.l||{};const m=d.m||{};const n=d.n||{};

  if(s==='A') return fichaSecA(a);
  if(s==='B') return fichaSecB(b);
  if(s==='C') return fichaSecC(c);
  if(s==='D') return `<div class="fg"><label>Descripción del problema actual</label><textarea class="fi" id="fo_enfactual" rows="8" placeholder="Describa la enfermedad o problema actual del paciente, incluyendo síntomas, duración, evolución..." style="text-transform:uppercase" autocomplete="off">${d.d?.descripcion||''}</textarea><p style="font-size:10px;color:var(--tm);margin-top:4px">Incluya: síntomas principales, tiempo de evolución, factores agravantes o atenuantes.</p></div>`;
  if(s==='E') return fichaSecE(e);
  if(s==='F') return fichaSecF(f);
  if(s==='G') return fichaSecG(d.g||{});
  if(s==='H') return fichaSecH(h);
  if(s==='I') return fichaSecI(d.i||{});
  if(s==='J') return fichaSecJ(j);
  if(s==='K') return fichaSecK(k);
  if(s==='L') return fichaSecL(l);
  if(s==='M') return fichaSecM(m);
  if(s==='R') return fichaSecRetiro(d.r||{});
  if(s==='N') return fichaSecN(n);
  return '';
}

function calcIMC(){const p=parseFloat(gv('fo_peso')),t=parseFloat(gv('fo_talla'))/100;if(p>0&&t>0){const imc=(p/(t*t)).toFixed(1);document.getElementById('fo_imc').value=imc;let cl='Normal';if(imc<18.5)cl='Bajo peso';else if(imc<25)cl='Normal';else if(imc<30)cl='Sobrepeso';else if(imc<35)cl='Obesidad I';else if(imc<40)cl='Obesidad II';else cl='Obesidad III';document.getElementById('fo_cimc').value=cl;}}

  ];

  }

  return cats.map(c=>renderCat(c)).join('')+`

// Quitar acentos para búsqueda
function noAc(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();}

// Búsqueda dinámica CIUO
function searchCIUO(inputId,resId){
  const q=noAc(document.getElementById(inputId)?.value||'');
  const box=document.getElementById(resId);if(!box)return;
  if(q.length<2){box.style.display='none';return;}
  const matches=(S.cargos_ciuo||[]).filter(c=>noAc(c.codigo+' '+c.nombre).includes(q)).slice(0,15);
  if(!matches.length){box.style.display='none';return;}
  const rect=document.getElementById(inputId).getBoundingClientRect();
  box.style.cssText=`position:fixed;z-index:9999;background:#fff;border:2px solid #2b6cb0;border-radius:8px;max-height:200px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.3);left:${rect.left}px;top:${rect.bottom+2}px;width:${rect.width}px`;
  box.innerHTML=matches.map(c=>`<div style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #e2e8f0;color:#1a202c" onmouseover="this.style.background='#ebf4ff'" onmouseout="this.style.background='#fff'" onmousedown="document.getElementById('${inputId}').value='(${c.codigo}) ${c.nombre}';document.getElementById('${resId}').style.display='none'"><span style="color:#2b6cb0;font-weight:700;margin-right:6px">${c.codigo}</span>${c.nombre}</div>`).join('');
  box.style.display='block';
  document.getElementById(inputId).onblur=()=>setTimeout(()=>box.style.display='none',200);
}

function guardarMedico(){
  const nombre=gv('fo_medico')?.trim(),codigo=gv('fo_codmed')?.trim();
  if(!nombre||!codigo){alert('Ingrese nombre y código del médico');return;}
  const list=JSON.parse(localStorage.getItem('vw_medicos_list')||'[]');
  if(list.find(m=>m.nombre===nombre&&m.codigo===codigo)){alert('Este médico ya está guardado');return;}
  list.push({nombre,codigo});
  localStorage.setItem('vw_medicos_list',JSON.stringify(list));
  render();
}

async function generarPDFOficial(modo='formulario'){
  saveFichaSection();
  const d=FO.data,p=gP(FO.pid)||{},mc=getMedCfg();
  const edad=p.fecha_nacimiento?Math.floor((new Date()-new Date(p.fecha_nacimiento))/31557600000):'';
  
  const payload={
    _modo:modo,
    _paciente:{cedula:p.cedula||'',fecha_nacimiento:p.fecha_nacimiento||'',edad:String(edad)},
    _empresa:{nombre:(d.a||{}).empresa||'',ruc:(d.a||{}).ruc||'',ciiu:(d.a||{}).ciiu||''},
    a:d.a||{},
    b:d.b||{},
    c:d.c||{},
    d:d.d||{},
    e:d.e||{},
    f:d.f||{},
    g:d.g||{},
    h:d.h||{},
    i:d.i||{},
    j:d.j||{},
    k:d.k||{},
    l:d.l||{},
    m:d.m||{},
    n:{medico:mc.nombre||'',codigo:mc.codigo||''},
    r:d.r||{},
  };
  
  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='⏳ Generando PDF...';}
  
  try{
    const res=await fetch('https://vitalwork-pdf-service.onrender.com/generar-pdf',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('Error del servidor: '+res.status);
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const link=document.createElement('a');
    link.href=url;
    link.download=`formulario_${(d.a?.ap1||'').toUpperCase()}_${(d.a?.n1||'').toUpperCase()}_${(d.b?.fecha_atencion||'').replace(/-/g,'')}.pdf`;
    link.click();
    URL.revokeObjectURL(url);
    toast('✅ PDF generado correctamente');
  }catch(err){
    console.error('Error generando PDF:',err);
    alert('❌ Error generando PDF: '+err.message+'\n\nSi el servicio está iniciando, espera 1 minuto e intenta de nuevo.');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📋 Formulario PDF';}
  }
}

async function svEmpCli(eid){
  const nombre=document.getElementById('ec_nombre')?.value?.trim();
  if(!nombre){alert('El nombre de la empresa es obligatorio');return;}
  const data={
    nombre,
    ruc:document.getElementById('ec_ruc')?.value?.trim()||'',
    ciiu:document.getElementById('ec_ciiu')?.value?.trim()||'',
    direccion:document.getElementById('ec_dir')?.value?.trim()||'',
    telefono:document.getElementById('ec_tel')?.value?.trim()||'',
    contacto:document.getElementById('ec_contacto')?.value?.trim()||'',
  };
  if(!S.empresas_cli)S.empresas_cli=[];
  if(eid){
    const i=S.empresas_cli.findIndex(e=>e.id===eid);
    if(i>-1){
      S.empresas_cli[i]={...S.empresas_cli[i],...data};
      if(DB_OK)await SB.patch('empresas',data,`id=eq.${eid}`);
    }
  }else{
    if(DB_OK){
      const r=await SB.post('empresas',data);
      if(r&&r[0])S.empresas_cli.push({id:r[0].id,...data});
      else S.empresas_cli.push({id:gid(),...data});
    }else{
      S.empresas_cli.push({id:gid(),...data});
    }
  }
  closeModal();render();
  alert(`✅ Empresa ${eid?'actualizada':'registrada'}: ${nombre}`);
}

async function delEmpCli(eid){
  const e=(S.empresas_cli||[]).find(x=>x.id===eid);
  if(!e)return;
  if(!confirm(`¿Eliminar la empresa "${e.nombre}"?`))return;
  S.empresas_cli=S.empresas_cli.filter(x=>x.id!==eid);
  if(DB_OK)await SB.del('empresas',`id=eq.${eid}`);
  render();
  alert(`✅ Empresa eliminada: ${e.nombre}`);
}

function getDashCfg(){

    if(!v.frases||!Array.isArray(v.frases)||v.frases.length===0)v.frases=[..._defaultFrases];
    return v;
  }catch(e){return{titulo:'',subtitulo:'',frases:[..._defaultFrases]};}
}

function applyTheme(){
  const tc=getThemeCfg();
  // Si tiene paletaId, aplicar paleta completa
  const paleta=tc.paletaId?_getPaletas().find(p=>p.id===tc.paletaId):null;
  const src=paleta||tc;
  if(!src.a&&!src.primary)return;
  const r=document.documentElement.style;
  if(src.bg||src.bg){r.setProperty('--bg',src.bg);r.setProperty('--ci',src.bg);}
  if(src.c1||src.card){r.setProperty('--c1',src.c1||src.card);r.setProperty('--c2',src.c2||src.card);}
  if(src.bd)r.setProperty('--bd',src.bd);
  if(src.t)r.setProperty('--t',src.t);
  if(src.tm){r.setProperty('--tm',src.tm);r.setProperty('--td',src.tm);}
  if(src.a||src.primary){const c=src.a||src.primary;r.setProperty('--a',c);r.setProperty('--as',c+'1f');}
  if(src.tl||src.secondary){const c=src.tl||src.secondary;r.setProperty('--tl',c);r.setProperty('--tls',c+'1f');}
  if(src.ok){r.setProperty('--ok',src.ok);r.setProperty('--oks',src.ok+'1f');}
  if(src.w||src.warn){const c=src.w||src.warn;r.setProperty('--w',c);r.setProperty('--ws',c+'1f');}
  if(src.er)r.setProperty('--er',src.er);
  // Si hay colores manuales que sobreescriben
  if(tc.primary&&!paleta){r.setProperty('--a',tc.primary);r.setProperty('--as',tc.primary+'1f');}
  if(tc.secondary&&!paleta){r.setProperty('--tl',tc.secondary);r.setProperty('--tls',tc.secondary+'1f');}
}

async function importGSheet(){
  const url=document.getElementById('gs_url').value.trim();
  if(!url){alert('Pega la URL del Google Sheet');return;}
  if(!confirm('¿Importar datos del Google Sheet?\nSe agregarán como pacientes y citas nuevas (no se duplican por cédula).'))return;
  try{
    const r=await fetch(url);if(!r.ok){alert('❌ Error de conexión');return;}
    const csv=await r.text();
    const rows=csv.split('\n').map(r=>r.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
    if(rows.length<2){alert('Sheet vacío');return;}
    const hdr=rows[0].map(h=>h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
    const fi=(keys)=>hdr.findIndex(h=>keys.some(k=>h.includes(k)));
    const iNom=fi(['nombre','name']);const iCed=fi(['cedula','ci','id']);
    const iEmp=fi(['empresa','company']);const iCiu=fi(['ciudad','city']);
    const iEmail=fi(['email','correo','mail']);const iFecha=fi(['fecha','date']);
    const iHora=fi(['hora','time','turno']);

    if(iNom===-1||iEmp===-1){alert('❌ No se encontraron columnas "nombre" y "empresa" en el Sheet.\nEncabezados detectados: '+rows[0].join(', '));return;}

    let added=0,skipped=0;
    for(let i=1;i<rows.length;i++){
      const r=rows[i];if(!r[iNom])continue;
      const ced=iCed>-1?r[iCed]:'';
      // Skip if already exists by cedula
      if(ced&&S.pts.find(p=>p.cedula===ced)){skipped++;continue;}
      const pd={nombre:r[iNom],cedula:ced,empresa:r[iEmp]||'',ciudad:iCiu>-1?r[iCiu]:'',email:iEmail>-1?r[iEmail]:'',telefono:'',genero:'',direccion:'',cargo:'',fecha_nacimiento:''};
      await addP(pd);
      // If has date, create appointment
      if(iFecha>-1&&r[iFecha]){
        const pid=S.pts.find(p=>p.cedula===ced)?.id;
        if(pid){await addA({pid,tipo:'Laboratorio',fecha:r[iFecha],hora:iHora>-1?r[iHora]:'07:30',origen:'gsheet'});}
      }
      added++;
    }
    alert(`✅ Importación completada\n👤 Pacientes agregados: ${added}\n⏭️ Ya existían (omitidos): ${skipped}`);
    render();
  }catch(e){alert('❌ Error: '+e.message);}
}

// ═══ SYNC: Cargar citas del formulario público (localStorage) ═══
function syncPublic(){
  try{
    const pubPts=JSON.parse(localStorage.getItem('mediagenda_pts')||'[]');
    const pubApt=JSON.parse(localStorage.getItem('mediagenda_apt')||'[]');
    pubPts.forEach(p=>{if(!S.pts.find(x=>x.cedula===p.cedula)){S.pts.push(p);}});
    pubApt.forEach(a=>{if(!S.apt.find(x=>x.id===a.id)){S.apt.push(a);}});
  }catch(e){}
}

// ═══ AUTO-REFRESH INTELIGENTE (solo render si hay cambios) ═══
let _refreshTimer=null;
let _lastDataHash='';

function _dataHash(pts,apt,ord){
  // Generar un hash simple basado en cantidad y últimos IDs
  const p=pts?pts.length:0;
  const a=apt?apt.length:0;
  const o=ord?ord.length:0;
  const lastPid=pts&&pts.length>0?pts[pts.length-1].id:'';
  const lastAid=apt&&apt.length>0?apt[apt.length-1].id:'';
  const lastOid=ord&&ord.length>0?ord[ord.length-1].id:'';
  // También incluir estados para detectar cambios de estado
  const estados=apt?apt.map(x=>x.estado).join(''):'';
  const ordEstados=ord?ord.map(x=>x.estado).join(''):'';
  return`${p}-${a}-${o}-${lastPid}-${lastAid}-${lastOid}-${estados}-${ordEstados}`;
}

async function autoRefresh(){
  if(!DB_OK||!S.u)return;
  try{
    const [pts,apt,ord]=await Promise.all([
      SB.get('pacientes','select=*&order=created_at'),
      SB.get('citas','select=*&order=created_at'),
      SB.get('ordenes','select=*&order=created_at'),
    ]);
    if(pts===null)return;
    
    // Verificar si hay cambios reales
    const newHash=_dataHash(pts,apt,ord);
    const hasChanges=newHash!==_lastDataHash;
    
    // Siempre actualizar datos en memoria
    S.pts=pts.map(p=>({id:p.id,nombre:p.nombre,cedula:p.cedula,telefono:p.telefono||'',email:p.email||'',genero:p.genero||'',direccion:p.direccion||'',ciudad:p.ciudad||'',empresa:p.empresa,cargo:p.cargo||'',fecha_nacimiento:p.fecha_nacimiento||''}));
    S.apt=apt?apt.map(a=>({id:a.id,pid:a.pid,tipo:a.tipo,fecha:a.fecha,hora:a.hora,estado:a.estado,asistio:a.asistio,exAsig:a.ex_asig,origen:a.origen||'admin'})):S.apt;
    S.ord=ord?ord.map(o=>({id:o.id,aid:o.aid,pid:o.pid,cat:o.cat,exams:o.exams||[],parte:o.parte||'',proy:o.proy||'',estado:o.estado})):S.ord;
    
    _lastDataHash=newHash;
    
    // Solo hacer render si hay cambios Y el usuario no está ocupado
    if(hasChanges&&!_isUserBusy()){
      render();
    }
  }catch(e){console.warn('AutoRefresh error:',e);}
}

function _isUserBusy(){
  if(document.querySelector('.mo'))return true;
  if(document.getElementById('bloq_modal_overlay'))return true;
  const ae=document.activeElement;
  if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT'))return true;
  return false;
}
function startAutoRefresh(){if(_refreshTimer)clearInterval(_refreshTimer);_refreshTimer=setInterval(autoRefresh,5000);}
function stopAutoRefresh(){if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}}

// ═══ DESCARGAR EXCEL DE PACIENTES ATENDIDOS ═══
// ═══ ENVIAR WHATSAPP ═══
function sendWA(aid,tipo){
  const a=S.apt.find(x=>x.id===aid);if(!a)return;
  const p=gP(a.pid);if(!p)return;
  const ec=getEmpCfg();
  const tel=p.telefono?p.telefono.replace(/\D/g,''):'';
  if(!tel||tel.length<7){alert('⚠️ Este paciente no tiene número de celular registrado');return;}
  
  // Formatear número para Ecuador (agregar 593 si empieza con 0)
  let num=tel;
  if(num.startsWith('0'))num='593'+num.slice(1);
  if(!num.startsWith('593'))num='593'+num;

  const fecha=new Date(a.fecha+'T12:00:00');
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fechaStr=`${dias[fecha.getDay()]} ${fecha.getDate()} de ${meses[fecha.getMonth()]} ${fecha.getFullYear()}`;

  let msg='';
  if(tipo==='confirmacion'){
    msg=`🏥 *${ec.nombre||'VitalWork S.A.S.'}*\n_Salud Ocupacional_\n\n`
      +`Hola *${p.nombre}*, su cita ha sido registrada exitosamente ✅\n\n`
      +`📅 *Fecha:* ${fechaStr}\n`
      +`🕐 *Hora:* ${fT(a.hora)}\n`
      +`🏢 *Empresa:* ${p.empresa||''}\n`
      +`📋 *Tipo:* ${a.tipo||'Laboratorio'}\n\n`
      +`📍 *Dirección:* ${ec.direccion||''}\n`
      +(ec.maps_url?`📌 *Ubicación:* ${ec.maps_url}\n`:'')
      +(ec.wa_phone?`📱 *WhatsApp contacto:* ${ec.wa_phone}\n`:'')
      +`\n⚠️ *Recomendaciones:*\n`
      +`• Presentarse *15 minutos antes*\n`
      +`• Traer *cédula original*\n`
      +`• *Ayuno de 8 a 12 horas* (no comer ni beber, excepto agua)\n`
      +`• No realizar ejercicio intenso la noche anterior\n\n`
      +`¡Le esperamos! 🙌`;
  }else if(tipo==='recordatorio'){
    msg=`🏥 *${ec.nombre||'VitalWork S.A.S.'}*\n\n`
      +`📢 *RECORDATORIO DE CITA*\n\n`
      +`Hola *${p.nombre}*, le recordamos que tiene una cita:\n\n`
      +`📅 *Fecha:* ${fechaStr}\n`
      +`🕐 *Hora:* ${fT(a.hora)}\n`
      +`📍 *Dirección:* ${ec.direccion||''}\n`
      +(ec.maps_url?`📌 *Ubicación:* ${ec.maps_url}\n`:'')
      +`\n⚠️ Recuerde: *ayuno de 8-12 horas* y traer *cédula original*\n\n`
      +`¡Le esperamos mañana! 🙌`;
  }

  const url=`https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

function sendWABulk(fecha){
  const citas=S.apt.filter(a=>a.fecha===fecha&&a.estado!=='cancelada');
  const conTel=citas.filter(a=>{const p=gP(a.pid);return p&&p.telefono&&p.telefono.replace(/\D/g,'').length>=7;});
  if(conTel.length===0){alert('⚠️ Ningún paciente tiene celular registrado');return;}
  
  const sinTel=citas.length-conTel.length;
  const ok=confirm(`📱 Se abrirá WhatsApp para ${conTel.length} pacientes.\n${sinTel>0?`⚠️ ${sinTel} pacientes no tienen celular.\n`:''}Cada mensaje se abre en una pestaña nueva.\n\n¿Continuar?`);
  if(!ok)return;

  conTel.forEach((a,i)=>{
    setTimeout(()=>sendWA(a.id,'recordatorio'),i*1500);
  });
}

function downloadExcelAtendidos(periodo){
  let desde='',hasta='';
  const hoy=new Date();
  if(periodo==='hoy'){
    desde=hasta=TD;
  }else if(periodo==='semana'){
    const d=new Date(hoy);d.setDate(d.getDate()-d.getDay());
    desde=d.toISOString().split('T')[0];hasta=TD;
  }else if(periodo==='mes'){
    desde=`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-01`;hasta=TD;
  }else if(periodo==='custom'){
    desde=document.getElementById('xl_desde')?.value||'';
    hasta=document.getElementById('xl_hasta')?.value||'';
    if(!desde||!hasta){alert('Selecciona fechas');return;}
  }else{
    desde='2020-01-01';hasta='2099-12-31';
  }

  const citas=S.apt.filter(a=>a.fecha>=desde&&a.fecha<=hasta&&a.estado!=='cancelada');
  if(citas.length===0){alert('No hay pacientes atendidos en ese período');return;}

  // Collect ALL unique exam names across all orders
  const allExams=new Set();
  citas.forEach(a=>{
    gAO(a.id).forEach(o=>{
      if(o.cat==='laboratorio'){(o.exams||[]).forEach(e=>allExams.add('🧪 '+e));}
      else if(o.cat==='radiologia'){allExams.add('🦴 RX: '+(o.parte||'')+(o.proy?' ('+o.proy+')':''));}
      else{const label=(o.exams||[])[0]||o.cat;allExams.add((cI[o.cat]||'')+' '+label);}
    });
  });
  const examCols=[...allExams].sort();

  // Build CSV header
  let csv='N°,Nombre,Cédula,Empresa,Ciudad,Fecha Cita,Hora,Tipo,Estado,Fecha Lab,Fecha Médica';
  examCols.forEach(e=>csv+=',"'+e.replace(/"/g,"'")+'"');
  csv+='\n';

  // Build rows
  citas.sort((a,b)=>(a.fecha+a.hora).localeCompare(b.fecha+b.hora)).forEach((a,idx)=>{
    const p=gP(a.pid);
    const ords=gAO(a.id);

    // Find lab and medical dates (fecha of completion)
    const labOrd=ords.find(o=>o.cat==='laboratorio');
    const medOrd=ords.find(o=>o.cat==='atencion_medica');
    const fechaLab=labOrd&&labOrd.estado==='completado'?a.fecha:'';
    const fechaMed=medOrd&&medOrd.estado==='completado'?a.fecha:'';

    // Build exam status map
    const examStatus={};
    ords.forEach(o=>{
      if(o.cat==='laboratorio'){
        (o.exams||[]).forEach(e=>{examStatus['🧪 '+e]=o.estado==='completado'?'✅':'❌';});
      }else if(o.cat==='radiologia'){
        const key='🦴 RX: '+(o.parte||'')+(o.proy?' ('+o.proy+')':'');
        examStatus[key]=o.estado==='completado'?'✅':'❌';
      }else{
        const label=(o.exams||[])[0]||o.cat;
        const key=(cI[o.cat]||'')+' '+label;
        examStatus[key]=o.estado==='completado'?'✅':'❌';
      }
    });

    csv+=`${idx+1},"${p?.nombre||''}","${p?.cedula||''}","${p?.empresa||''}","${p?.ciudad||''}","${a.fecha}","${a.hora}","${a.tipo}","${a.estado}","${fechaLab}","${fechaMed}"`;
    examCols.forEach(e=>csv+=`,"${examStatus[e]||'—'}"`);
    csv+='\n';
  });

  // Download
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download=`pacientes_${desde}_a_${hasta}.csv`;
  link.click();URL.revokeObjectURL(url);
  alert(`✅ Descargado: ${citas.length} pacientes\n📊 ${examCols.length} columnas de exámenes\nArchivo: pacientes_${desde}_a_${hasta}.csv`);
}
